name: Safie Auto Downloader (rclone Mount Version)

on:
  schedule:
    - cron: '*/5 * * * *' # 5分ごとに自動起動
  workflow_dispatch: # 手動起動ボタン

jobs:
  check_job:
    runs-on: ubuntu-latest
    steps:
    - name: コードの読み込み
      uses: actions/checkout@v4

    - name: Pythonの準備
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 依存ライブラリのインストール
      run: |
        pip install selenium requests
        sudo apt-get update
        sudo apt-get install -y libnss3 libgbm1 libasound2t64 || sudo apt-get install -y libnss3 libgbm1 libasound2

    - name: rclone（マウントツール）のインストールと設定
      run: |
        sudo curl https://rclone.org/install.sh | sudo bash
        mkdir -p ~/.config/rclone
        cat << EOF > ~/.config/rclone/rclone.conf
        [gdrive]
        type = drive
        token = ${{ secrets.DRIVE_CREDENTIALS }}
        root_folder_id = 17lDpuOIqM7iLQPLm_1EVOHqBxEQ7195K
        EOF

    - name: Googleドライブをシステムにマウント
      run: |
        mkdir -p /home/runner/googledrive
        # 💡 キャッシュの同期漏れを防ぐため、書き込みと同時に反映するモード（--vfs-cache-mode off または writes）
        # リモート制御用のポート（--rc）も開きます
        rclone mount gdrive: /home/runner/googledrive --vfs-cache-mode writes --rc &
        sleep 5
        ls -la /home/runner/googledrive

    - name: 巡回プログラムの実行
      env:
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        SAFIE_ID: ${{ secrets.SAFIE_ID }}
        SAFIE_PW: ${{ secrets.SAFIE_PW }}
      run: python main.py

    - name: Googleドライブへのアップロード完了を強制待機
      run: |
        printenv
        echo "⏳ rcloneのキャッシュからGoogleドライブへのアップロード完了を待っています..."
        # 💡 マウントフォルダ内のすべてのデータがGoogleドライブへ送信し尽くされるまで強制同期を掛けます
        rclone rc vfs/forget || true
        sync
        # クラウドへの反映時間を確実につくるため、最後に60秒間強制的にプロセスを維持します
        sleep 60
        echo "✅ 同期待機時間を終了しました。"
