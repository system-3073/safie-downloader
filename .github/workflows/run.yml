name: Safie Auto Downloader

on:
  repository_dispatch:
    types: [trigger_download]

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install selenium requests
        sudo apt-get update
        sudo apt-get install -y libnss3 libgbm1 libasound2t64 || sudo apt-get install -y libnss3 libgbm1 libasound2

    - name: Run Downloader
      env:
        SAFIE_ID: ${{ secrets.SAFIE_ID }}
        SAFIE_PW: ${{ secrets.SAFIE_PW }}
        GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
        DOWNLOAD_URL: ${{ github.event.client_payload.download_url }}
      run: python main.py

    # 💡【ここを追加！】Googleの公式ツールを使って、解凍された動画フォルダを直接ドライブへ瞬時にアップロードします
    - name: Upload to Google Drive
      uses: adityass आजाद/google-drive-upload-git-action@v1
      with:
        credentials: ${{ secrets.DRIVE_CREDENTIALS }} # 👈※後ほど設定します
        filename: ./extracted/
        folderId: '17lDpuOIqM7iLQPLm_1EVOHqBxEQ7195K' # 山下さんのフォルダID
        overwrite: "true"
