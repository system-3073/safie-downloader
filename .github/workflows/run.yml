name: Safie Auto Downloader (rclone Mount Version)

on:
  schedule:
    - cron: '*/10 * * * *' # 10分ごとに自動起動
  workflow_dispatch: # 手動起動ボタン

jobs:
  check_job:
    runs-on: ubuntu-latest
    steps:
    - name: コードの読み込み
      uses: actions/checkout@v4

    - name: Pythonの準備
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 依存ライブラリのインストール
      run: |
        pip install selenium requests
        sudo apt-get update
        sudo apt-get install -y libnss3 libgbm1 libasound2t64 || sudo apt-get install -y libnss3 libgbm1 libasound2

    - name: rclone（マウントツール）のインストールと設定
      run: |
        sudo curl https://rclone.org/install.sh | sudo bash
        mkdir -p ~/.config/rclone
        cat << EOF > ~/.config/rclone/rclone.conf
        [gdrive]
        type = drive
        token = ${{ secrets.DRIVE_CREDENTIALS }}
        root_folder_id = 17lDpuOIqM7iLQPLm_1EVOHqBxEQ7195K
        EOF

    - name: Googleドライブをシステムにマウント
      run: |
        mkdir -p /home/runner/googledrive
        rclone mount gdrive: /home/runner/googledrive --vfs-cache-mode writes --rc --rc-no-auth &
        sleep 5
        ls -la /home/runner/googledrive

    - name: 巡回プログラムの実行
      env:
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        SAFIE_ID: ${{ secrets.SAFIE_ID }}
        SAFIE_PW: ${{ secrets.SAFIE_PW }}
      run: python main.py

    - name: Googleドライブへの転送完了を200%保証する（動的監視）
      run: |
        echo "⏳ キャッシュに残っているアップロード待ちファイルをスキャン中..."
        timeout=0
        while [ $timeout -lt 300 ]; do
          unbacked_files=$(rclone rc --rc-no-auth vfs/status 2>/dev/null | json_pp | grep -A 1 '"unbacked_files"' | tail -n 1 | tr -d ' ,')
          if [ -z "$unbacked_files" ] || [ "$unbacked_files" -eq 0 ]; then
            echo "✨ クラウドへの完全同期を確認しました！安全に終了します。"
            break
          fi
          echo "🔄 まだ $unbacked_files 本のファイルをアップロード中です。10秒後に再確認します... (経過: ${timeout}秒)"
          sleep 10
          timeout=$((timeout + 10))
        done
        rclone rc --rc-no-auth vfs/forget || true
        sync
        sleep 5
