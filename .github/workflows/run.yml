name: Safie Auto Downloader (GAS Triggered Version)

# 💡 10分おきの定期実行(schedule)を廃止し、外部（GAS）からの信号(repository_dispatch)で動くようにします
on:
  repository_dispatch:
    types: [trigger_safie_download]
  workflow_dispatch: # 手動起動ボタン（残しておきます）

jobs:
  check_job:
    runs-on: ubuntu-latest
    steps:
    - name: コードの読み込み
      uses: actions/checkout@v4

    - name: Pythonの準備
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 依存ライブラリのインストール
      run: |
        pip install selenium requests
        sudo apt-get update
        sudo apt-get install -y libnss3 libgbm1 libasound2t64 || sudo apt-get install -y libnss3 libgbm1 libasound2

    - name: rcloneのインストールと設定
      run: |
        sudo curl https://rclone.org/install.sh | sudo bash
        mkdir -p ~/.config/rclone
        cat << EOF > ~/.config/rclone/rclone.conf
        [gdrive]
        type = drive
        token = ${{ secrets.DRIVE_CREDENTIALS }}
        root_folder_id = 17lDpuOIqM7iLQPLm_1EVOHqBxEQ7195K
        EOF

    - name: 巡回プログラムの実行（ローカルへの動画展開）
      env:
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        SAFIE_ID: ${{ secrets.SAFIE_ID }}
        SAFIE_PW: ${{ secrets.SAFIE_PW }}
      run: python main.py

    - name: Googleドライブへ確実・同期アップロード（100%同期待機）
      run: |
        if [ -d "/home/runner/upload_staging" ] && [ "$(ls -A /home/runner/upload_staging)" ]; then
          echo "🚀 ローカルに展開された動画を発見しました。Googleドライブへ確実に同期転送します..."
          rclone copy /home/runner/upload_staging gdrive: --verbose
          echo "✨ すべてのフォルダと動画のクラウド同期が200%完了しました！"
        else
          echo "📭 アップロード対象の動画はありませんでした。"
        fi
