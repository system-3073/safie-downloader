name: Safie Auto Downloader

on:
  repository_dispatch:
    types: [trigger_download]

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install selenium google-api-python-client google-auth-httplib2 google-auth-oauthlib requests
        sudo apt-get update
        sudo apt-get install -y libnss3 libgbm1 libasound2t64 || sudo apt-get install -y libnss3 libgbm1 libasound2

    - name: Run Downloader
      env:
        SAFIE_ID: ${{ secrets.SAFIE_ID }}
        SAFIE_PW: ${{ secrets.SAFIE_PW }}
        GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
        DOWNLOAD_URL: ${{ github.event.client_payload.download_url }}
      run: python main.py

    # 💡 解凍された複数の動画が入ったoutputフォルダを、GitHub上にZIPとして自動保管します
    - name: Upload Videos to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: videos
        path: ./output/
        retention-days: 1
