name: Safie Auto Downloader (Colab Migration)

on:
  schedule:
    # 💡 10分ごとに自動で裏パソコンを起動してGmailをチェックする設定
    - cron: '*/10 * * * *'
  workflow_dispatch: # 手動で今すぐ動かしたい時のボタン

jobs:
  check_job: # 👈 日本語の「巡回チェック」から半角英数字の「check_job」に修正しました！
    runs-on: ubuntu-latest
    steps:
    - name: コードの読み込み
      uses: actions/checkout@v4

    - name: Pythonの準備
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 依存ライブラリのインストール
      run: |
        pip install selenium requests google-api-python-client google-auth-httplib2 google-auth-oauthlib
        sudo apt-get update
        sudo apt-get install -y libnss3 libgbm1 libasound2t64 || sudo apt-get install -y libnss3 libgbm1 libasound2

    - name: 巡回プログラムの実行
      env:
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        SAFIE_ID: ${{ secrets.SAFIE_ID }}
        SAFIE_PW: ${{ secrets.SAFIE_PW }}
        DRIVE_CREDENTIALS: ${{ secrets.DRIVE_CREDENTIALS }}
      run: python main.py
