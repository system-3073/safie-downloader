name: Safie Auto Downloader

on:
  repository_dispatch:
    types: [trigger_download]

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install selenium google-api-python-client google-auth-httplib2 google-auth-oauthlib requests
        sudo apt-get update
        # 💡 新旧のLinux環境どちらでもエラーにならない安全なパッケージ指定に変更しました
        sudo apt-get install -y libnss3 libgbm1 libasound2t64 || sudo apt-get install -y libnss3 libgbm1 libasound2

    - name: Run Downloader
      env:
        SAFIE_ID: ${{ secrets.SAFIE_ID }}
        SAFIE_PW: ${{ secrets.SAFIE_PW }}
        GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
        DOWNLOAD_URL: ${{ github.event.client_payload.download_url }}
      run: python main.py
