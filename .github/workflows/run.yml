name: Safie Auto Downloader

on:
  repository_dispatch:
    types: [trigger_download]

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install selenium requests
        sudo apt-get update
        sudo apt-get install -y libnss3 libgbm1 libasound2t64 || sudo apt-get install -y libnss3 libgbm1 libasound2

    - name: Run Downloader
      env:
        SAFIE_ID: ${{ secrets.SAFIE_ID }}
        SAFIE_PW: ${{ secrets.SAFIE_PW }}
        GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
        DOWNLOAD_URL: ${{ github.event.client_payload.download_url }}
      run: python main.py

    # 1. 先に動画ZIPを完全にGitHub上に保存する（ここで確実に33MBのファイルが作られます）
    - name: Upload Videos to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: videos
        path: ./output/
        retention-days: 1

    # 2. 💡【ここを修正】保存が「100%完了した後」に、GASへフォルダ名を通知する
    - name: Notify GAS
      if: success()
      run: |
        # main.pyが残したフォルダ名を取得してGASへ送信
        FOLDER_NAME=$(ls ./downloads | sed 's/\.zip//g' | head -n 1)
        curl -X POST -H "Content-Type: application/json" \
             -d "{\"status\":\"ready\",\"folder_name\":\"$FOLDER_NAME\"}" \
             ${{ secrets.GAS_WEBHOOK_URL }}
